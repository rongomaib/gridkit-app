name: Release

on:
  # push:
  #   tags: ['*']
  #
  #   branches: ["test-release"]

  workflow_dispatch:

jobs:
  studio:
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-12

      fail-fast: false

    name: release-studio-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout the commit
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: npm install

      - name: Builds workspace packages
        run: npm run build:pkg

      - name: Package, make, and publish studio app
        run: npm run -w '@villagekit/studio' publish
