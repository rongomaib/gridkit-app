name: Release Apps

on:
  # release:
  #  types: [published]

  push:
    branches:
      - release/studio

  workflow_dispatch:

jobs:
  studio:
    permissions:
      contents: write

    strategy:
      fail-fast: false

      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: nschloe/action-cached-lfs-checkout@v1

      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/setup-turbo

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install native dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Builds workspace packages
        run: pnpm run build:pkg

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/studio
          # releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}
          # tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || 'app-v__VERSION__' }}
          # releaseDraft: ${{ github.event_name == 'release' && github.event.release.draft || true }}
          # prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || true }}
          tagName: studio-v__VERSION__
          releaseDraft: true
          prerelease: true
          releaseName: 'Village Kit Studio v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          args: ${{ matrix.args }}
