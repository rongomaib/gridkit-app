<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wall Module Override Logic Test</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
.test { margin: 8px 0; padding: 6px 12px; border-radius: 4px; }
.pass { background: #1a3a1a; border-left: 4px solid #4caf50; }
.fail { background: #3a1a1a; border-left: 4px solid #f44336; }
.info { color: #888; font-size: 12px; margin: 4px 0 4px 16px; }
#summary { margin-top: 20px; font-size: 18px; font-weight: bold; }
#summary.all-pass { color: #4caf50; }
#summary.some-fail { color: #f44336; }
</style>
</head>
<body>
<h2>Wall Module Override Logic — Runtime Verification</h2>
<p style="color:#888;font-size:13px">Tests the exact <code>applyOverridesToPartValues</code> logic from context.tsx</p>
<div id="results"></div>
<div id="summary"></div>

<script type="module">
// === EXACT LOGIC COPY FROM context.tsx usePartValues ===
function applyOverridesToPartValues(values, overrides) {
  if (Object.keys(overrides).length === 0) return values
  return values.map((v) => {
    const id = v.id
    if (id == null) return v
    const patch = overrides[id]
    if (patch == null) return v
    return { ...v, ...patch }
  })
}

// === EXACT LOGIC COPY FROM gl.tsx WallFrameGl ===
function wallFrameGlReturnsNull(glValue) {
  return glValue.moduleType === 'open'
}

const mockParts = [
  { type: 'wall-frame', id: 'wall-f-1-a', widthInGrids: 20, heightInGrids: 30, moduleType: 'solid' },
  { type: 'wall-frame', id: 'wall-f-1-b', widthInGrids: 20, heightInGrids: 30, moduleType: 'solid' },
  { type: 'timber',     id: 'post-1',     lengthInGrids: 40 },
]

const results = document.getElementById('results')
const summaryEl = document.getElementById('summary')
let pass = 0, fail = 0

function test(label, fn) {
  try {
    const result = fn()
    const div = document.createElement('div')
    if (result.ok) {
      div.className = 'test pass'
      div.textContent = '✓ ' + label
      pass++
    } else {
      div.className = 'test fail'
      div.textContent = '✗ ' + label + ' — ' + result.reason
      fail++
    }
    results.appendChild(div)
    if (result.info) {
      const info = document.createElement('div')
      info.className = 'info'
      info.textContent = result.info
      results.appendChild(info)
    }
  } catch(e) {
    const div = document.createElement('div')
    div.className = 'test fail'
    div.textContent = '✗ ' + label + ' — threw: ' + e.message
    results.appendChild(div)
    fail++
  }
}

test('Empty overrides → identity (fast path)', () => {
  const r = applyOverridesToPartValues(mockParts, {})
  return r === mockParts ? { ok: true } : { ok: false, reason: 'different reference' }
})

test('moduleType=open → WallFrameGl renders null (panel disappears)', () => {
  const overrides = { 'wall-f-1-a': { moduleType: 'open' } }
  const r = applyOverridesToPartValues(mockParts, overrides)
  const part = r.find(v => v.id === 'wall-f-1-a')
  const isNull = wallFrameGlReturnsNull(part)
  return isNull
    ? { ok: true, info: 'moduleType=open → WallFrameGl returns null' }
    : { ok: false, reason: `moduleType=${part?.moduleType} did not trigger null return` }
})

test('moduleType=window → WallFrameGl renders (blue glass)', () => {
  const overrides = { 'wall-f-1-a': { moduleType: 'window' } }
  const r = applyOverridesToPartValues(mockParts, overrides)
  const part = r.find(v => v.id === 'wall-f-1-a')
  return part.moduleType === 'window' && !wallFrameGlReturnsNull(part)
    ? { ok: true, info: 'moduleType=window → renders blue glass mesh' }
    : { ok: false, reason: `unexpected moduleType=${part?.moduleType}` }
})

test('moduleType=door → WallFrameGl renders (brown mesh)', () => {
  const overrides = { 'wall-f-1-a': { moduleType: 'door' } }
  const r = applyOverridesToPartValues(mockParts, overrides)
  const part = r.find(v => v.id === 'wall-f-1-a')
  return part.moduleType === 'door' && !wallFrameGlReturnsNull(part)
    ? { ok: true, info: 'moduleType=door → renders brown mesh' }
    : { ok: false, reason: `unexpected moduleType=${part?.moduleType}` }
})

test('Override only affects targeted part; others unchanged', () => {
  const overrides = { 'wall-f-1-a': { moduleType: 'open' } }
  const r = applyOverridesToPartValues(mockParts, overrides)
  const other = r.find(v => v.id === 'wall-f-1-b')
  const timber = r.find(v => v.id === 'post-1')
  if (other.moduleType !== 'solid') return { ok: false, reason: `wall-f-1-b changed to ${other.moduleType}` }
  if (timber.lengthInGrids !== 40) return { ok: false, reason: 'timber changed' }
  return { ok: true }
})

test('Other GL value properties preserved after override', () => {
  const overrides = { 'wall-f-1-a': { moduleType: 'open' } }
  const r = applyOverridesToPartValues(mockParts, overrides)
  const part = r.find(v => v.id === 'wall-f-1-a')
  if (part.widthInGrids !== 20) return { ok: false, reason: `widthInGrids=${part.widthInGrids}` }
  if (part.type !== 'wall-frame') return { ok: false, reason: `type=${part.type}` }
  return { ok: true }
})

test('Sequential overrides: solid→window→door→open all work', () => {
  let overrides = {}
  const check = (mt) => {
    overrides = { 'wall-f-1-a': { moduleType: mt } }
    const r = applyOverridesToPartValues(mockParts, overrides)
    return r.find(v => v.id === 'wall-f-1-a').moduleType === mt
  }
  for (const mt of ['window', 'door', 'open', 'solid']) {
    if (!check(mt)) return { ok: false, reason: `${mt} failed` }
  }
  return { ok: true, info: 'All four module types toggle correctly' }
})

summaryEl.textContent = `${pass} / ${pass + fail} tests passed`
summaryEl.className = fail === 0 ? 'all-pass' : 'some-fail'
document.title = `[${fail === 0 ? 'PASS' : 'FAIL'}] Wall Override Test`
document.body.dataset.testResult = fail === 0 ? 'PASS' : 'FAIL'
document.body.dataset.testPass = String(pass)
document.body.dataset.testFail = String(fail)
</script>
</body>
</html>
